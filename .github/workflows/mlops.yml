name: MLOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pathspec==0.11.2
        pip install -r requirements.txt

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Pull data from DVC
      run: dvc pull

    - name: Run DVC pipeline
      run: dvc repro

    - name: Run tests
      run: PYTHONPATH=. pytest tests/ -v

    - name: Display metrics
      run: |
        echo "## Training Metrics" >> $GITHUB_STEP_SUMMARY
        cat metrics/train_scores.json >> $GITHUB_STEP_SUMMARY || echo "train_scores.json not found" >> $GITHUB_STEP_SUMMARY
        echo "## Test Metrics" >> $GITHUB_STEP_SUMMARY
        cat metrics/test_scores.json >> $GITHUB_STEP_SUMMARY || echo "test_scores.json not found" >> $GITHUB_STEP_SUMMARY

    - name: Upload metrics artifact
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: metrics/

    - name: Build Docker image
      run: docker build -t 2022bcs0044hadiqc/churn-mlops .

    - name: Login to DockerHub
      run: echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

    - name: Push Docker image
      run: docker push 2022bcs0044hadiqc/churn-mlops